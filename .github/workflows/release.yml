name: Release
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            api.segment.io:443
            artifacts.nixos.org:443
            cache.nixos.org:443
            github.com:443
            release-assets.githubusercontent.com:443
            releases.jetify.com:443
            releases.jetpack.io:443
            uploads.github.com:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: 'true'
          refresh-cli: 'false'

      - name: Create Release Artifacts
        run: devbox run make release
        env:
          IMAGE_VERSION: ${{ github.ref_name }}

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            ./release/karpenter-${{ github.ref_name }}.tgz
            ./release/karpenter-crd-${{ github.ref_name }}.tgz

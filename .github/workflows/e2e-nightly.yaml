name: e2e-nightly

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  pull-requests: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
      LINODE_CLI_TOKEN: ${{ secrets.LINODE_TOKEN }}
      LINODE_REGION: us-sea
      CLUSTER_NAME: karpl-nightly-${{ github.run_id }}
      KUBECONFIG: nightly-${{ github.run_id }}-kubeconfig
      CHAINSAW_SELECTOR: all
      CHAINSAW_FLAGS: --config .chainsaw.yaml

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install linode-cli
        run: pipx install linode-cli==5.65.0

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.14.0
        with:
          enable-cache: 'true'
          refresh-cli: 'false'

      - name: Run E2E
        run: |
          devbox run setup-and-test-e2e

  cleanup:
    if: ${{ always() }}
    needs: [e2e]
    timeout-minutes: 20
    runs-on: ubuntu-latest

    env:
      LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
      LINODE_CLI_TOKEN: ${{ secrets.LINODE_TOKEN }}
      CLUSTER_NAME: karpl-nightly-${{ github.run_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install linode-cli
        run: pipx install linode-cli==5.65.0

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.14.0
        with:
          enable-cache: 'true'
          refresh-cli: 'false'

      - name: Delete nightly LKE cluster
        run: |
          CLUSTER_ID=$(devbox run get-lke-cluster-id)
          if [ -n "$CLUSTER_ID" ]; then
            devbox run destroy-lke-cluster "$CLUSTER_ID"
          else
            echo "No nightly cluster found for cleanup"
          fi

name: e2e-manual-trigger

on:
  workflow_dispatch:
    inputs:
      chainsaw_selector:
        description: Chainsaw selector to run for manual dispatch
        required: false
        default: all
      cluster_tier:
        description: LKE cluster tier to run for manual dispatch
        required: false
        default: standard
        type: choice
        options:
          - standard
          - enterprise

permissions:
  contents: read
  pull-requests: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-manual-standard:
    name: Manual E2E (standard)
    if: ${{ inputs.cluster_tier == 'standard' }}
    uses: ./.github/workflows/e2e.yaml
    with:
      cluster_name: ${{ format('km-{0}', github.run_id) }}
      cluster_tier: standard
      chainsaw_selector: ${{ inputs.chainsaw_selector }}
      cleanup: true
      timeout_minutes: 90
      cleanup_timeout_minutes: 20
      harden_runner_egress_policy: block
      harden_runner_allowed_endpoints: >-
        *.us-sea-2-gw.linodelke.net:443
        api.github.com:443
        api.linode.com:443
        api.segment.io:443
        artifacts.nixos.org:443
        auth.docker.io:443
        cache.nixos.org:443
        files.pythonhosted.org:443
        gcr.io:443
        github.com:443
        index.docker.io:443
        ipv4.icanhazip.com:443
        linode.github.io:443
        pypi.org:443
        registry-1.docker.io:443
        release-assets.githubusercontent.com:443
        releases.jetify.com:443
        releases.jetpack.io:443
    secrets: inherit

  e2e-manual-enterprise:
    name: Manual E2E (enterprise)
    if: ${{ inputs.cluster_tier == 'enterprise' }}
    uses: ./.github/workflows/e2e.yaml
    with:
      cluster_name: ${{ format('km-{0}', github.run_id) }}
      cluster_tier: enterprise
      chainsaw_selector: ${{ inputs.chainsaw_selector }}
      cleanup: true
      timeout_minutes: 90
      cleanup_timeout_minutes: 20
      harden_runner_egress_policy: block
      harden_runner_allowed_endpoints: >-
        *.api.us-sea.enterprise.linodelke.net:6443
        api.github.com:443
        api.linode.com:443
        api.segment.io:443
        artifacts.nixos.org:443
        auth.docker.io:443
        cache.nixos.org:443
        cloud.tilt.dev:443
        files.pythonhosted.org:443
        gcr.io:443
        github.com:443
        index.docker.io:443
        ipv4.icanhazip.com:443
        linode.github.io:443
        pypi.org:443
        registry-1.docker.io:443
        release-assets.githubusercontent.com:443
        releases.jetify.com:443
        releases.jetpack.io:443
    secrets: inherit

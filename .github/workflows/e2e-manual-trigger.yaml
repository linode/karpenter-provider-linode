name: e2e-manual-trigger

on:
  workflow_dispatch:
    inputs:
      chainsaw_selector:
        description: Chainsaw selector to run for manual dispatch
        required: false
        default: all
      cluster_tier:
        description: LKE cluster tier to run for manual dispatch
        required: false
        default: standard
        type: choice
        options:
          - standard
          - enterprise

permissions:
  contents: read
  pull-requests: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-manual:
    name: Manual E2E (${{ inputs.cluster_tier }})
    uses: ./.github/workflows/e2e.yaml
    with:
      cluster_name: ${{ format('km-{0}', github.run_id) }}
      cluster_tier: ${{ inputs.cluster_tier }}
      chainsaw_selector: ${{ inputs.chainsaw_selector }}
      cleanup: true
      timeout_minutes: 90
      cleanup_timeout_minutes: 20
    secrets: inherit

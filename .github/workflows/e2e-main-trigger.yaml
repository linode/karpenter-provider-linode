name: e2e-main-trigger

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read
  actions: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      paths: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            *.githubusercontent.com:443

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: .github/filters.yml

  e2e-main-standard:
    name: Main E2E (standard)
    needs: [changes]
    if: ${{ contains(fromJSON(needs.changes.outputs.paths), 'src') }}
    uses: ./.github/workflows/e2e.yaml
    with:
      cluster_name: ${{ format('kps-{0}', github.run_id) }}
      cluster_tier: standard
      chainsaw_selector: pr
      cleanup: true
      timeout_minutes: 60
      cleanup_timeout_minutes: 20
    secrets: inherit

  e2e-main-enterprise:
    name: Main E2E (enterprise)
    needs: [changes]
    if: ${{ contains(fromJSON(needs.changes.outputs.paths), 'src') }}
    uses: ./.github/workflows/e2e.yaml
    with:
      cluster_name: ${{ format('kpe-{0}', github.run_id) }}
      cluster_tier: enterprise
      chainsaw_selector: pr
      cleanup: true
      timeout_minutes: 90
      cleanup_timeout_minutes: 20
    secrets: inherit

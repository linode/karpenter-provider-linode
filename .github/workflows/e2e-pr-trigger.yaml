name: e2e-pr-trigger

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    outputs:
      paths: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: .github/filters.yml

  e2e-pr:
    name: PR E2E (standard)
    needs: [changes]
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && (contains(fromJSON(needs.changes.outputs.paths), 'src') || contains(fromJSON(needs.changes.outputs.paths), 'e2e_ci'))
    uses: ./.github/workflows/e2e.yaml
    with:
      environment: ${{ (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository) && 'prod-external' || 'prod' }}
      cluster_name: ${{ format('kpr-{0}', github.event.pull_request.number) }}
      chainsaw_selector: pr
      cleanup: false
      timeout_minutes: 60
      cleanup_timeout_minutes: 20
      harden_runner_egress_policy: block
      harden_runner_allowed_endpoints: >-
        *.linodelke.net:443
        api.github.com:443
        api.linode.com:443
        api.segment.io:443
        artifacts.nixos.org:443
        auth.docker.io:443
        cache.nixos.org:443
        files.pythonhosted.org:443
        gcr.io:443
        github.com:443
        index.docker.io:443
        ipv4.icanhazip.com:443
        linode.github.io:443
        pypi.org:443
        registry-1.docker.io:443
        release-assets.githubusercontent.com:443
        releases.jetify.com:443
        releases.jetpack.io:443
    secrets: inherit

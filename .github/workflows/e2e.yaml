name: e2e

on:
  workflow_call:
    inputs:
      cluster_name:
        type: string
        required: true
      cluster_tier:
        type: string
        required: false
        default: standard
      chainsaw_selector:
        type: string
        required: true
      cleanup:
        type: boolean
        required: true
      timeout_minutes:
        type: number
        required: false
        default: 60
      cleanup_timeout_minutes:
        type: number
        required: false
        default: 20
      chainsaw_flags:
        type: string
        required: false
        default: --config .chainsaw.yaml
      harden_runner_egress_policy:
        type: string
        required: true
      harden_runner_allowed_endpoints:
        type: string
        required: true

env:
  E2E_STANDARD_CLEANUP_ALLOWED_ENDPOINTS: >-
    api.github.com:443
    api.linode.com:443
    api.segment.io:443
    artifacts.nixos.org:443
    cache.nixos.org:443
    files.pythonhosted.org:443
    github.com:443
    pypi.org:443
    release-assets.githubusercontent.com:443
    releases.jetify.com:443
    releases.jetpack.io:443
  E2E_ENTERPRISE_CLEANUP_ALLOWED_ENDPOINTS: >-
    api.github.com:443
    api.linode.com:443
    api.segment.io:443
    artifacts.nixos.org:443
    cache.nixos.org:443
    cloud.tilt.dev:443
    files.pythonhosted.org:443
    github.com:443
    pypi.org:443
    release-assets.githubusercontent.com:443
    releases.jetify.com:443
    releases.jetpack.io:443

permissions:
  contents: read
  pull-requests: read
  actions: read

jobs:
  e2e:
    name: E2E (${{ inputs.cluster_tier }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    env:
      LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
      LINODE_CLI_TOKEN: ${{ secrets.LINODE_TOKEN }}
      LINODE_REGION: us-sea
      CLUSTER_NAME: ${{ inputs.cluster_name }}
      CLUSTER_TIER: ${{ inputs.cluster_tier }}
      CHAINSAW_SELECTOR: ${{ inputs.chainsaw_selector }}
      CHAINSAW_FLAGS: ${{ inputs.chainsaw_flags }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: ${{ inputs.harden_runner_egress_policy }}
          allowed-endpoints: ${{ inputs.harden_runner_allowed_endpoints }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: E2E setup and test
        uses: ./.github/actions/e2e
        with:
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          docker_password: ${{ secrets.DOCKER_PASSWORD }}
          devbox_command: setup-and-test-e2e

  cleanup:
    name: Cleanup (${{ inputs.cluster_tier }})
    if: ${{ inputs.cleanup && always() }}
    needs: [e2e]
    timeout-minutes: ${{ inputs.cleanup_timeout_minutes }}
    runs-on: ubuntu-latest
    env:
      LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
      LINODE_CLI_TOKEN: ${{ secrets.LINODE_TOKEN }}
      CLUSTER_NAME: ${{ inputs.cluster_name }}
      CLUSTER_TIER: ${{ inputs.cluster_tier }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: ${{ inputs.cluster_tier == 'enterprise' && env.E2E_ENTERPRISE_CLEANUP_ALLOWED_ENDPOINTS || env.E2E_STANDARD_CLEANUP_ALLOWED_ENDPOINTS }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: E2E Cleanup 
        uses: ./.github/actions/e2e
        with:
          cleanup_cluster: "true"

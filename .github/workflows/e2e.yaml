name: e2e

on:
  workflow_call:
    inputs:
      cluster_name:
        type: string
        required: true
      chainsaw_selector:
        type: string
        required: true
      cleanup:
        type: boolean
        required: true
      timeout_minutes:
        type: number
        required: false
        default: 60
      cleanup_timeout_minutes:
        type: number
        required: false
        default: 20
      chainsaw_flags:
        type: string
        required: false
        default: --config .chainsaw.yaml

permissions:
  contents: read
  pull-requests: read
  actions: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    env:
      LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
      LINODE_CLI_TOKEN: ${{ secrets.LINODE_TOKEN }}
      LINODE_REGION: us-sea
      CLUSTER_NAME: ${{ inputs.cluster_name }}
      CHAINSAW_SELECTOR: ${{ inputs.chainsaw_selector }}
      CHAINSAW_FLAGS: ${{ inputs.chainsaw_flags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install linode-cli
        run: pipx install linode-cli==5.65.0

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.14.0
        with:
          enable-cache: 'true'
          refresh-cli: 'false'

      - name: Run E2E
        run: devbox run setup-and-test-e2e

  cleanup:
    if: ${{ inputs.cleanup && always() }}
    needs: [e2e]
    timeout-minutes: ${{ inputs.cleanup_timeout_minutes }}
    runs-on: ubuntu-latest
    env:
      LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
      LINODE_CLI_TOKEN: ${{ secrets.LINODE_TOKEN }}
      CLUSTER_NAME: ${{ inputs.cluster_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install linode-cli
        run: pipx install linode-cli==5.65.0

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.14.0
        with:
          enable-cache: 'true'
          refresh-cli: 'false'

      - name: Delete LKE cluster after E2E
        run: |
          CLUSTER_ID=$(devbox run get-lke-cluster-id)
          if [ -n "$CLUSTER_ID" ]; then
            devbox run destroy-lke-cluster "$CLUSTER_ID"
          else
            echo "No cluster found for cleanup"
          fi

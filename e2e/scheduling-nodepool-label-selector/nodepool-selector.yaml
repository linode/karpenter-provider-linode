apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: selector
  labels:
    e2e.linode.dev/cleanup: "true"
spec:
  template:
    metadata:
      labels:
        e2e.linode.dev/selector: "true"
        e2e.linode.dev/cleanup: "true"
    spec:
      requirements:
        - key: e2e.linode.dev/selector
          operator: Exists
      nodeClassRef:
        group: karpenter.k8s.linode
        kind: LinodeNodeClass
        name: default
  limits:
    cpu: 1000

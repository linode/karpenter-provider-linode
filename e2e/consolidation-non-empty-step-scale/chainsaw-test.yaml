# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  creationTimestamp: null
  name: consolidation-non-empty-step-scale
  labels:
    all:
    category.consolidation:
spec:
  steps:
    - name: Make sure there are no lingering NodeClaims
      try:
      - script:
          content: kubectl get nodeclaim -o json
          check:
            ($error): ~
            (json_parse($stdout).items | length(@)): 0

    - name: Create consolidation NodePool
      try:
      - apply:
          file: nodepool-consolidation.yaml

    - name: Create inflate deployment
      try:
      - apply:
          file: inflate-consolidation.yaml

    - name: Wait for initial scheduling
      try:
      - assert:
          timeout: 10m
          resource:
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: inflate
              namespace: default
            status:
              replicas: 5
              availableReplicas: 5
      catch:
      - describe:
          apiVersion: karpenter.sh/v1
          kind: NodeClaim
      - script:
          content: kubectl get events -A --sort-by=.lastTimestamp | tail -n 50
      - podLogs:
          namespace: kube-system
          selector: app.kubernetes.io/name=karpenter
          tail: 100

    - name: Check for two g6-standard-4 NodeClaims to be ready
      try:
      - script:
          timeout: 15m
          content: |
            set -euo pipefail
            count=$(kubectl get nodeclaim \
              -l karpenter.sh/nodepool=consolidation-step-scale,node.kubernetes.io/instance-type=g6-standard-4 \
              -o name | wc -l | tr -d ' ')
            if [ "$count" -lt 2 ]; then
              echo "Expected at least 2 g6-standard-4 NodeClaims, got $count"
              exit 1
            fi
      catch:
      - describe:
          apiVersion: karpenter.sh/v1
          kind: NodeClaim
      - script:
          content: kubectl get events -A --sort-by=.lastTimestamp | tail -n 50
      - podLogs:
          namespace: kube-system
          selector: app.kubernetes.io/name=karpenter
          tail: 100

    - name: Non-empty consolidation replacement after step-scale
      try:
      - script:
          timeout: 20m
          content: |
            set -euo pipefail
            kubectl -n default scale deployment inflate --replicas 8
            kubectl -n default rollout status deployment/inflate --timeout=15m
            kubectl -n default scale deployment inflate --replicas 2
            kubectl -n default rollout status deployment/inflate --timeout=15m
            for _ in $(seq 1 60); do
              total=$(kubectl get nodeclaim \
                -l karpenter.sh/nodepool=consolidation-step-scale \
                -o name | wc -l | tr -d ' ')
              matching=$(kubectl get nodeclaim \
                -l karpenter.sh/nodepool=consolidation-step-scale,node.kubernetes.io/instance-type=g6-standard-4 \
                -o name | wc -l | tr -d ' ')
              if [ "$total" -eq 1 ] && [ "$matching" -eq 1 ]; then
                name=$(kubectl get nodeclaim \
                  -l karpenter.sh/nodepool=consolidation-step-scale,node.kubernetes.io/instance-type=g6-standard-4 \
                  -o jsonpath='{.items[0].metadata.name}')
                kubectl wait "nodeclaim/$name" --for=condition=Ready --timeout=30s
                exit 0
              fi
              sleep 15
            done
            echo "Expected exactly 1 g6-standard-4 NodeClaim after scale down, got:"
            kubectl get nodeclaim -l karpenter.sh/nodepool=consolidation-step-scale
            exit 1
      catch:
      - describe:
          apiVersion: karpenter.sh/v1
          kind: NodeClaim
      - script:
          content: kubectl get events -A --sort-by=.lastTimestamp | tail -n 50
      - podLogs:
          namespace: kube-system
          selector: app.kubernetes.io/name=karpenter
          tail: 100

    - name: Scale inflate deployment to zero
      try:
      - script:
          content: kubectl -n default scale deployment inflate --replicas 0

    - name: Wait for NodeClaims to be deleted
      try:
      - wait:
          apiVersion: karpenter.sh/v1
          kind: NodeClaim
          timeout: 10m
          selector: karpenter.sh/nodepool=consolidation-step-scale
          for:
            deletion: {}
      catch:
      - describe:
          apiVersion: karpenter.sh/v1
          kind: NodeClaim
      - script:
          content: kubectl get events -A --sort-by=.lastTimestamp | tail -n 50
      - podLogs:
          namespace: kube-system
          selector: app.kubernetes.io/name=karpenter
          tail: 100

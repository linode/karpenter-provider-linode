apiVersion: apps/v1
kind: Deployment
metadata:
  name: inflate
  namespace: default
  labels:
    e2e.linode.dev/cleanup: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inflate
  template:
    metadata:
      labels:
        app: inflate
        e2e.linode.dev/cleanup: "true"
    spec:
      terminationGracePeriodSeconds: 0
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      nodeSelector:
        e2e.linode.dev/drift-labels-taints: "true"
      containers:
      - name: inflate
        image: mirror.registry.linodelke.net/k8s/pause:3.9
        resources:
          requests:
            cpu: 1
        securityContext:
          allowPrivilegeEscalation: false

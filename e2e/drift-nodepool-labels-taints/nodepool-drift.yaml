apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: drift-labels-taints
  labels:
    e2e.linode.dev/cleanup: "true"
spec:
  template:
    metadata:
      labels:
        e2e.linode.dev/drift-labels-taints: "true"
        e2e.linode.dev/cleanup: "true"
    spec:
      requirements:
        - key: e2e.linode.dev/drift-labels-taints
          operator: Exists
      taints:
        - key: e2e.linode.dev/test
          value: "true"
          effect: NoSchedule
      nodeClassRef:
        group: karpenter.k8s.linode
        kind: LinodeNodeClass
        name: default
  limits:
    cpu: 1000
